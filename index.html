<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0e4d7;
        }
        #game {
            width: 400px;
            height: 400px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            background-color: #bbada0;
        }
        .tile {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background-color: #eee4da;
            font-size: 2em;
            color: #776e65;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        const gameElement = document.getElementById('game');
        const tiles = Array(16).fill(0);
        let score = 0;
        
        function draw() {
            gameElement.innerHTML = '';
            tiles.forEach((tile, index) => {
                const tileElement = document.createElement('div');
                tileElement.className = 'tile';
                tileElement.innerText = tile || '';
                gameElement.appendChild(tileElement);
            });
        }
        
        function getRandomIndex() {
            return Math.floor(Math.random() * tiles.length);
        }
        
        function addTile() {
            let index;
            do {
                index = getRandomIndex();
            } while (tiles[index] !== 0);
            tiles[index] = Math.random() < 0.9 ? 2 : 4;
        }
        
        function slideTiles(direction) {
            // Add logic for sliding tiles based on the direction
            // For example, 'left', 'right', 'up', 'down'
        }
        
        function combineTiles() {
            // Add logic for combining tiles
        }
        
        function move(dir) {
            slideTiles(dir);
            combineTiles();
            draw();
        }
        
        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowLeft':
                    move('left');
                    break;
                case 'ArrowRight':
                    move('right');
                    break;
                case 'ArrowUp':
                    move('up');
                    break;
                case 'ArrowDown':
                    move('down');
                    break;
            }
        });
        
        addTile();
        addTile();
        draw();
    </script>
</body>
</html>
